name: Run script on release

on:
  release:
    types: [published]

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar screen
        run: sudo apt-get update && sudo apt-get install -y screen

      - name: Instalar dependencias raíz
        run: npm install

      - name: Instalar dependencias API
        run: cd api && npm install

      - name: Instalar dependencias frontend
        run: cd frontend && npm install

      - name: Compilar frontend
        run: cd frontend && npm run build

      - name: Compilar API
        run: cd api && npm run build

      - name: Iniciar API en screen
        run: |
          foldername=$(basename "$(pwd)")
          for session in $(screen -ls | grep -o "[0-9]*\.$foldername"); do screen -S "${session}" -X quit; done
          screen -dmS "$foldername" bash
          screen -S "$foldername" -X stuff "cd api && npm run start:prod \n"
          screen -ls
        
      - name: Verificar que API está corriendo
        run: |
          sleep 10
          curl -f http://localhost:3000 || echo "API no responde"