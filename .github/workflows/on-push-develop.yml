name: Deploy to Develop

on:
  push:
    branches: [ '**' ]

jobs:
  deploy:
    if: contains(toUpper(github.event.head_commit.message), 'DEPLOY')
    runs-on: ubuntu-latest
    environment: DEVELOP
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          set -e

          echo "=== INFORMACIÓN DEL AMBIENTE DEVELOP ==="
          echo "Hostname: $(hostname)"
          echo "Sistema operativo: $(uname -a)"
          echo "Directorio actual: $(pwd)"
          echo "Usuario: $(whoami)"
          echo "Git version: $(git --version)"
          echo "================================"

          echo "Iniciando deploy de CloserClick en VPS..."

          # Cargar nvm para tener acceso a npm
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"

          # Configurar SSH para clonar repositorio
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts

          # Clonar repositorio si no existe
          if [ ! -d "${{ secrets.VPS_PATH }}" ]; then
            echo "Clonando repositorio en: ${{ secrets.VPS_PATH }}"
            git clone git@github.com:${{ github.repository }}.git "${{ secrets.VPS_PATH }}"
          fi

          # Navegar al directorio del proyecto develop
          cd ${{ secrets.VPS_PATH }}

          # Obtener el nombre de la carpeta para la sesión screen
          foldername=$(basename "$(pwd)")

          # Detener sesiones screen existentes
          echo "Deteniendo sesiones screen existentes..."
          for session in $(screen -ls | grep -o "[0-9]*\.$foldername"); do
              screen -S "${session}" -X quit
          done

          # Verificar estado y limpiar todos los archivos modificados
          echo "Verificando estado de Git..."
          git status
          
          echo "Limpiando todos los archivos modificados..."
          git checkout -- . 2>/dev/null || true
          
          echo "Actualizando referencias remotas..."
          git fetch origin
          
          echo "Cambiando a rama ${{ github.ref_name }}..."
          git checkout ${{ github.ref_name }}
          
          echo "Actualizando código desde Git..."
          git pull

          # Instalar dependencias
          echo "Instalando dependencias raíz..."
          npm install

          echo "Instalando dependencias API..."
          cd api && npm install && cd ..

          echo "Instalando dependencias frontend..."
          cd frontend && npm install && cd ..

          # Compilar proyectos
          echo "Compilando frontend..."
          cd frontend && npm run build && cd ..

          echo "Compilando API..."
          cd api && npm run build && cd ..

          # Verificar que la compilación fue exitosa
          echo "Verificando compilación del API..."
          if [ ! -f "api/dist/main.js" ]; then
            echo "ERROR: No se encontró api/dist/main.js - La compilación falló"
            exit 1
          fi

          # Iniciar API en screen
          echo "Iniciando API en sesión screen..."
          screen -dmS "$foldername" bash -c "cd ${{ secrets.VPS_PATH }}/api && npm run start:prod"

          # Mostrar sesiones activas
          echo "Sesiones screen activas:"
          screen -ls

          echo "Deploy en ambiente DEVELOP completado exitosamente!"
          EOF